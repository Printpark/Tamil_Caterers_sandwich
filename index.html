<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tamil Caterers</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Segoe UI,Arial,sans-serif;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

background:#efeae2;

background-image:
radial-gradient(circle at 20px 20px,#ffffff55 2px,transparent 2px),
radial-gradient(circle at 70px 70px,#ffffff55 2px,transparent 2px);

background-size:90px 90px;

}

.card{

width:340px;

background:white;

border-radius:16px;

padding:28px;

box-shadow:0 8px 22px rgba(0,0,0,.12);

border:1px solid #ececec;

}

h1{

text-align:center;

font-size:28px;

letter-spacing:1px;

margin-bottom:18px;

color:#222;

}

.product{

text-align:center;

font-size:18px;

font-weight:600;

color:#2e7d32;

margin-bottom:22px;

}

.info{

font-size:17px;

color:#333;

line-height:2.1;

}

.row{

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:1px solid #f1f1f1;

padding:8px 0;

}

.label{

font-weight:600;

}

.value{

font-weight:500;

}

.price{

margin-top:20px;

padding:12px;

text-align:center;

background:#edf7ef;

border-radius:10px;

font-size:20px;

font-weight:700;

color:#1b5e20;

}

</style>

</head>

<body>

<div class="card">

<h1>TAMIL CATERERS</h1>

<div class="product">
🟢 VEG • 🌽 CORN SANDWICH
</div>

<div class="info">

<div class="row">
<span class="label">FSSAI No.</span>
<span class="value">10026912000209</span>
</div>

<div class="row">
<span class="label">MFG</span>
<span id="mfg-date"></span>
</div>

<div class="row">
<span class="label">Validity</span>
<span>1 Day</span>
</div>

</div>

<div class="price">
₹60
</div>

</div>

<script>

const today=new Date();

const day=String(today.getDate()).padStart(2,'0');
const month=String(today.getMonth()+1).padStart(2,'0');
const year=today.getFullYear();

document.getElementById("mfg-date").textContent=
`${day}-${month}-${year}`;

</script>

</body>
</html>
