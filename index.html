<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Karupatti House</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:#ffffff;
}

/* Top Shop Image */
.shop-banner img{
    width:100%;
    height:240px;
    object-fit:cover;
    display:block;
}

/* Card */
.card{
    width:340px;
    background:#fff;
    margin:-30px auto 30px;
    border-radius:18px;
    padding:28px;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
    position:relative;
}

/* Restaurant Name */
h1{
    text-align:center;
    font-size:30px;
    color:#222;
    margin-bottom:18px;
}

/* Product */
.product{
    text-align:center;
    font-size:20px;
    font-weight:700;
    color:#2e7d32;
    margin-bottom:25px;
}

/* Rows */
.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 0;
    border-bottom:1px solid #ececec;
}

.label{
    font-size:17px;
    font-weight:700;
    color:#333;
}

.value{
    font-size:17px;
    color:#333;
}

/* Price */
.price{
    margin-top:22px;
    background:#edf7ef;
    border-radius:12px;
    padding:14px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#1b5e20;
}

/* Footer */
.footer{
    margin-top:18px;
    text-align:center;
    color:#888;
    font-size:15px;
}

</style>

</head>

<body>
<div class="shop-banner">
    <img src="shop.jpg" alt="Karupetti House">
</div>

<div class="card">

<h1>Karupatti House</h1>

<div class="product">
🟢 VEG • 🌽 CORN SANDWICH
</div>

<div class="info">

<div class="row">
<span class="label">FSSAI No.</span>
<span class="value">10026912000209</span>
</div>

<div class="row">
<span class="label">MFG</span>
<span id="mfg-date"></span>
</div>

<div class="row">
<span class="label">Validity</span>
<span>1 Day</span>
</div>

</div>

<div class="price">
₹60
</div>

</div>

<script>

const today=new Date();

const day=String(today.getDate()).padStart(2,'0');
const month=String(today.getMonth()+1).padStart(2,'0');
const year=today.getFullYear();

document.getElementById("mfg-date").textContent=
`${day}-${month}-${year}`;

</script>

</body>
</html>
