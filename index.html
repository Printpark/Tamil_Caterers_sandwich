<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tamil Caterers Label</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    /* Soft WhatsApp-like background */
    background-color:#efeae2;
    background-image:
        radial-gradient(circle at 25px 25px, rgba(255,255,255,.35) 2px, transparent 2px),
        radial-gradient(circle at 75px 75px, rgba(255,255,255,.35) 2px, transparent 2px);
    background-size:100px 100px;
}

.food-card{
    width:92%;
    max-width:380px;
    background:#fff;
    border-radius:18px;
    padding:24px;
    box-shadow:0 8px 22px rgba(0,0,0,.12);
}

.company{
    text-align:center;
    font-size:26px;
    font-weight:bold;
    color:#333;
    letter-spacing:1px;
    margin-bottom:18px;
}

.item{
    font-size:22px;
    font-weight:700;
    color:#2e7d32;
    text-align:center;
    margin-bottom:18px;
}

.details{
    font-size:16px;
    color:#555;
    line-height:2;
}

.details strong{
    color:#222;
}

.divider{
    height:1px;
    background:#e5e5e5;
    margin:18px 0;
}

.validity{
    text-align:center;
    margin-top:15px;
    color:#c62828;
    font-weight:600;
}

.veg{
    display:inline-block;
    background:#2e7d32;
    color:white;
    padding:5px 12px;
    border-radius:20px;
    font-size:14px;
    margin-bottom:18px;
}
</style>
</head>

<body>

<div class="food-card">

    <div class="veg">🟢 VEG</div>

    <div class="company">TAMIL CATERERS</div>

    <div class="item">🌽 CORN SANDWICH</div>

    <div class="divider"></div>

    <div class="details">
        <strong>FSSAI No:</strong> 10026912000209<br>

        <strong>Price:</strong> Rs. 50<br>

        <strong>MFD:</strong> 25-Jun-2026<br>

        <strong>Validity:</strong> 1 Day
    </div>

    <div class="validity">
        VALID FOR 1 DAY
    </div>

</div>

</body>
</html>
