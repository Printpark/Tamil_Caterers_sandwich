<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tamil Caterers</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;

    background:#efeae2;
    background-image:
    radial-gradient(circle at 25px 25px, rgba(255,255,255,.35) 2px, transparent 2px),
    radial-gradient(circle at 75px 75px, rgba(255,255,255,.35) 2px, transparent 2px);
    background-size:100px 100px;
}

.food-card{
    width:92%;
    max-width:380px;
    background:#fff;
    border-radius:18px;
    padding:25px;
    border:1px solid #e5e5e5;
    box-shadow:0 8px 20px rgba(0,0,0,.10);
}

.company{
    text-align:center;
    font-size:30px;
    font-weight:700;
    color:#222;
    letter-spacing:1px;
    margin-bottom:15px;
}

.veg{
    width:max-content;
    margin:0 auto 18px;
    background:#2e7d32;
    color:#fff;
    padding:6px 18px;
    border-radius:25px;
    font-size:14px;
    font-weight:600;
}

.item{
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#2e7d32;
    margin-bottom:18px;
}

.details{
    color:#444;
    font-size:17px;
    line-height:1.4;
}

.details p{
    margin:5px 0;
}

.details strong{
    color:#222;
}

.price{
    margin-top:20px;
    background:#edf8ee;
    color:#1b5e20;
    text-align:center;
    padding:12px;
    border-radius:10px;
    font-size:26px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="food-card">

<div class="company">
TAMIL CATERERS
</div>
<p><strong>FSSAI No.</strong></p>
<p>10026912000209</p>

<div class="item">
🟢 VEG • CORN SANDWICH
</div>

<div class="details">

<p><strong>MFG</strong></p>
<p><span id="mfg-date"></span></p>

<p><strong>Validity</strong></p>
<p>1 DAY</p>

</div>

<div class="price">
Rs.  60
</div>

</div>

<script>

const today = new Date();

const day = String(today.getDate()).padStart(2,'0');
const month = String(today.getMonth()+1).padStart(2,'0');
const year = today.getFullYear();

document.getElementById("mfg-date").textContent =
`${day}-${month}-${year}`;

</script>

</body>
</html>
